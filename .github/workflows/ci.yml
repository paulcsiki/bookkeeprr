name: CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────────────────────────
  # Lint, typecheck, test - runs on every push and PR.
  # ─────────────────────────────────────────────────────────────
  test:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install p7zip-full
        # Required by routeFilesWithExtract integration tests.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends p7zip-full

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm --filter @bookkeeprr/web lint

      - name: Typecheck
        run: pnpm --filter @bookkeeprr/web typecheck

      - name: Test
        env:
          BOOKKEEPRR_7Z_BIN: 7z
        run: pnpm --filter @bookkeeprr/web test

  # ─────────────────────────────────────────────────────────────
  # Container build + push to GHCR.
  #
  # Runs on release:published (and manual dispatch), not on plain push.
  # Publishes the webapp image tagged `latest` plus semver (version and
  # major.minor), derived from the release tag.
  # ─────────────────────────────────────────────────────────────
  image:
    name: build + push container
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=bookkeeprr
            org.opencontainers.image.description=Self-hosted media manager for manga, comics, light novels, ebooks and audiobooks
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Compute build timestamp
        id: build_ts
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BOOKKEEPRR_COMMIT=${{ github.sha }}
            BOOKKEEPRR_BUILT_AT=${{ steps.build_ts.outputs.ts }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
