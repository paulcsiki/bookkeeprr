name: CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────────────────────────
  # Lint, typecheck, test - runs on every push and PR.
  # ─────────────────────────────────────────────────────────────
  test:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install p7zip-full
        # Required by routeFilesWithExtract integration tests.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends p7zip-full

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @bookkeeprr/web lint

      - name: Typecheck
        run: pnpm --filter @bookkeeprr/web typecheck

      - name: Test
        env:
          BOOKKEEPRR_7Z_BIN: 7z
        run: pnpm --filter @bookkeeprr/web test

  # ─────────────────────────────────────────────────────────────
  # Container build + push to GHCR.
  #
  # Runs on release:published (and manual dispatch), not on plain push.
  # Publishes the webapp image tagged `latest` plus semver (version and
  # major.minor), derived from the release tag.
  # ─────────────────────────────────────────────────────────────
  # Multi-arch build: one native runner per platform builds + pushes by digest,
  # then `merge` assembles the tagged manifest list. provenance:false removes the
  # `unknown/unknown` attestation entry GHCR otherwise lists as a pseudo-platform.
  image:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: test
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Platform pair
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
        env:
          platform: ${{ matrix.platform }}

      - name: Compute image labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          labels: |
            org.opencontainers.image.title=bookkeeprr
            org.opencontainers.image.description=Self-hosted media manager for manga, comics, light novels, ebooks and audiobooks
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build timestamp
        id: build_ts
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BOOKKEEPRR_COMMIT=${{ github.sha }}
            BOOKKEEPRR_BUILT_AT=${{ steps.build_ts.outputs.ts }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: merge + push manifest
    runs-on: ubuntu-latest
    needs: image
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create + push manifest list
        working-directory: ${{ runner.temp }}/digests
        env:
          # On a release, the package description becomes the release changelog;
          # otherwise the static tagline. Set on the index (manifest list) so
          # GHCR shows it for the multi-arch package.
          DESC: ${{ github.event.release.body || 'Self-hosted media manager for manga, comics, light novels, ebooks and audiobooks' }}
        run: |
          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.title=bookkeeprr" \
            --annotation "index:org.opencontainers.image.description=${DESC}" \
            --annotation "index:org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ github.repository }}@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.meta.outputs.version }}
