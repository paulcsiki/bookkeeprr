appId: com.bookkeeprr.app
env:
  EXPO_PUBLIC_MOBILE_E2E: '1'
  EXPO_PUBLIC_MOBILE_E2E_AUTOAUTH: '1'
---
# Covers the full Discover search lifecycle. Discover moved off the bottom tab
# bar onto the Home dashboard's Discover icon:
#   Home tab → home-discover icon → browse → search → riffle loader → results
#   grid + per-type count chips (the spec example: classroom set returns 7
#   light-novels, 0 of everything else).
# See library-list.yaml — runFlow's connected.yaml does its own
# launchApp clearState. Double-launching crashes Android and flakes iOS.
- runFlow: { file: ../onboarding/connected.yaml }
- tapOn: { id: 'btn-go-library' }
- assertVisible: { id: 'screen-library-grid' }
# Go to the Home tab (Discover lives behind its header icon now). iOS Maestro on
# the tab bar's Pressable is flaky — tapping twice gives navigation a second
# chance (the second tap is a no-op if Home is already focused).
- tapOn:
    id: 'tab-home'
    repeat: 2
- extendedWaitUntil:
    visible: { id: 'screen-home' }
    timeout: 10000
# Open Discover from the dashboard header icon.
- tapOn: { id: 'home-discover' }
# Browse state — title bar + the curated rows.
- extendedWaitUntil:
    visible: { id: 'screen-discover' }
    timeout: 10000
- assertVisible: 'ADD FROM 5 SOURCES'
- assertVisible: 'Trending now'
# Search → fixture matches "Classroom of the Elite" suggestion (7 light novels).
- tapOn: { id: 'discover-search-input' }
- inputText: 'Classroom of the Elite'
- pressKey: Enter
# Skip asserting the riffle loader directly — it's a transient state that
# Maestro's accessibility poll misses reliably even with LOADER_VISIBLE_MS
# stretched to 4s under EXPO_PUBLIC_MOBILE_E2E=1 (Android job 840 fails
# here while the same job's screenshot shows the results screen). The
# results-visible assertion below is the real signal that the search ran,
# so the loader check is purely cosmetic. Drop it.
# Assert the first result by its tile testID, NOT by title text: the result
# tile is a Pressable, and iOS collapses every child Text into the tile's
# single XCUIElement label, so an exact-match text assertion finds nothing
# even though the title renders (same quirk as the chips below and
# library-grid's cards — iOS job 2766 failed 3/3 on the text form).
- extendedWaitUntil:
    visible: { id: 'discover-add-anilist:classroom-1' }
    timeout: 8000
# The count breakdown is the spec example: All 7 · Manga 0 · Light Novel 7
# · Comic 0 · eBook 0 · Audiobook 0. Assert via the chip testIDs — the
# chip wraps its label in a Pressable which on iOS collapses the label
# Text into the Pressable's XCUIElement, so an exact-match `text: ...`
# assertion would fail even though the label renders correctly.
- assertVisible: { id: 'chip-all' }
- assertVisible: { id: 'chip-novel' }
