# Release calendar — Home header icon → month grid → day detail.
# Mocked-flow style: fixtures (src/lib/e2e-fetch-mock.ts) pin releases to the
# 3rd / 15th / 22nd of the CURRENT month, so the grid the app opens to always
# has seeded days. The 15th carries two releases (volumeIds 9101 + 9102).
# See library-list.yaml — runFlow's connected.yaml does its own
# launchApp clearState. Double-launching crashes Android and flakes iOS.
appId: com.bookkeeprr.app
env:
  EXPO_PUBLIC_MOBILE_E2E: '1'
  EXPO_PUBLIC_MOBILE_E2E_AUTOAUTH: '1'
---
- runFlow: { file: ../onboarding/connected.yaml }
- tapOn: { id: 'btn-go-library' }
- assertVisible: { id: 'screen-library-grid' }
# Go to the Home tab. iOS Maestro on the tab bar's Pressable is flaky —
# tapping twice gives navigation a second chance (the second tap is a no-op
# if Home is already focused). Same workaround as discover-search.yaml.
- tapOn:
    id: 'tab-home'
    repeat: 2
- extendedWaitUntil:
    visible: { id: 'screen-home' }
    timeout: 10000
# Open the calendar from the dashboard header icon.
- tapOn: { id: 'home-calendar' }
- extendedWaitUntil:
    visible: { id: 'screen-calendar' }
    timeout: 10000
- assertVisible: { id: 'cal-prev' }
- assertVisible: { id: 'cal-next' }
# Tap the 15th of the current month. The fixture pins its releases relative to
# "now", so the year-month varies per run — Maestro id selectors are regexes,
# which is far more reliable than evaluating inline JS for the testID.
- tapOn:
    id: 'cal-day-[0-9]{4}-[0-9]{2}-15'
# Phone pushes the day screen; assert one of the two seeded release rows.
- extendedWaitUntil:
    visible: { id: 'screen-calendar-day' }
    timeout: 10000
- assertVisible: { id: 'cal-release-9101' }
- assertVisible: { id: 'cal-release-9102' }
