appId: com.bookkeeprr.app
env:
  EXPO_PUBLIC_MOBILE_E2E: '1'
  EXPO_PUBLIC_MOBILE_E2E_AUTOAUTH: '1'
---
# A superseded download (a redundant sibling the server cancelled after a
# better release imported — terminal) lands in the history/"Done" tab with its
# SUPERSEDED note, not in the queue and not in blocked. fixtureDownloads id 8
# is the superseded row.
# connected.yaml does its own launchApp clearState — double-launching crashes
# Android and flakes iOS (see discover-search.yaml).
- runFlow: { file: ../onboarding/connected.yaml }
- tapOn: { id: 'btn-go-library' }
- assertVisible: { id: 'screen-library-grid' }
- assertVisible: { id: 'tab-activity' }
- tapOn: { id: 'tab-activity' }
- assertVisible: { id: 'screen-activity' }
- assertVisible: { id: 'tab-history' }
- tapOn: { id: 'tab-history' }
- assertVisible: { id: 'history-row-8' }
- assertVisible: 'SUPERSEDED · REPLACED BY A BETTER RELEASE'
