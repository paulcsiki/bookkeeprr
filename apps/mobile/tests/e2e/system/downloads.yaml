# System group — Downloads manager: expandable series groups + per-volume rows.
#
# AUTHORED ONLY (device-run optional): no emulator is wired into this checkout,
# so this flow is committed for the Maestro suite but not yet exercised on a
# device. Modeled on tests/e2e/system/cloud.yaml + offline.yaml.
#
# The Downloads manager renders from an on-disk scan (no network), so this flow
# assumes the device under test has at least one downloaded SERIES on disk
# (seeded by a prior reader/download flow, or pre-staged on the device). It
# drives the new testIDs from Task C4:
#   - `screen-downloads`              the screen itself
#   - `download-series-*`             a series group row (cover + name)
#   - `download-time-left`            the "Nd left" TTL countdown text
#   - `download-series-expand-*`      the chevron that toggles the volume list
#   - `download-volume-*`             a per-volume row inside the expanded group
#   - `download-remove-volume-*`      the per-volume Remove control
# Series/volume ids vary by seed, so we match the testID PREFIX with a regex and
# assert the time-left + remove control are present rather than pinning an id.
#
# Relies on the AUTOAUTH admin session from the connected onboarding flow.
appId: com.bookkeeprr.app
env:
  EXPO_PUBLIC_MOBILE_E2E: '1'
  EXPO_PUBLIC_MOBILE_E2E_AUTOAUTH: '1'
---
# connected.yaml does its own launchApp clearState — double-launching crashes
# Android and flakes iOS (see library-list.yaml / cloud.yaml).
- runFlow: { file: ../onboarding/connected.yaml }
- tapOn: { id: 'btn-go-library' }

# ── Navigate Settings → Downloads. ──
- tapOn: { text: 'Settings' }
- scrollUntilVisible:
    element: { id: 'row-downloads' }
    centerElement: true
# Rows on Android can need a second tap.
- tapOn:
    id: 'row-downloads'
    repeat: 2
- assertVisible: { id: 'screen-downloads' }

# ── A downloaded series row is present (cover + name + a time-left countdown). ──
# The disk scan + first render take a beat; extendedWaitUntil absorbs it.
- extendedWaitUntil:
    visible: { id: 'download-series-.*' }
    timeout: 20000
- assertVisible: { id: 'download-series-.*' }
# The series row shows the soonest expiry as an "Nd/Nh/Nm left" countdown.
- assertVisible: { id: 'download-time-left' }
- assertVisible: { text: '.*left' }

# ── Expand the series to reveal its per-volume rows. ──
- tapOn: { id: 'download-series-expand-.*' }
- extendedWaitUntil:
    visible: { id: 'download-volume-.*' }
    timeout: 20000
- assertVisible: { id: 'download-volume-.*' }
# Each volume row carries its own time-left + a Remove control.
- assertVisible: { id: 'download-time-left' }
- assertVisible: { id: 'download-remove-volume-.*' }
