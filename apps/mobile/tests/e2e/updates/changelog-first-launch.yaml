appId: com.bookkeeprr.app
env:
  EXPO_PUBLIC_MOBILE_E2E: '1'
  EXPO_PUBLIC_MOBILE_E2E_AUTOAUTH: '1'
  EXPO_PUBLIC_MOBILE_E2E_FORCE_CHANGELOG: '1'
---
- launchApp: { clearState: true }
- runFlow: { file: ../onboarding/connected.yaml }
- tapOn: { id: 'btn-go-library' }
- assertVisible: { id: 'changelog-modal' }
- assertVisible: { text: "What's new" }
- tapOn: { id: 'btn-changelog-dismiss' }
- waitForAnimationToEnd
- assertVisible: { id: 'screen-library-grid' }
